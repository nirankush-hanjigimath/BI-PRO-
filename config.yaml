# ─────────────────────────────────────────────────────────────────────────────
# Binance Signal Engine — Configuration
# ─────────────────────────────────────────────────────────────────────────────
# NOTE: DISCORD_WEBHOOK_URL is loaded from .env — do NOT hardcode it here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Symbols to scan ───────────────────────────────────────────────────────────
symbols:
  - XLMUSDT
  - SOLUSDT
  - BTCUSDT
  - ETHUSDT
  - BNBUSDT
  - XRPUSDT
  - DOGEUSDT

# ── Timeframes (all three required by the pipeline) ───────────────────────────
timeframes:
  - 15m
  - 1h
  - 4h

# ── Account ───────────────────────────────────────────────────────────────────
account:
  size_usd: 1000.0        # Static account size for position sizing

# ── Engine settings ───────────────────────────────────────────────────────────
engine:
  run_interval_minutes: 15          # How often the live/paper loop runs
  default_mode: dry-run             # live | paper | dry-run | backtest
  max_open_positions: 4
  log_dir: logs
  state_file: engine_state.json
  paper_state_file: paper_state.json

# ── Risk management ───────────────────────────────────────────────────────────
risk:
  per_trade_pct: 1.0                # % of account risked per trade
  daily_loss_limit_pct: 3.0        # Halt all signals if daily loss exceeds this
  weekly_loss_limit_pct: 8.0       # Halt + require manual reset
  cooldown_minutes: 30              # Per-symbol cooldown after any exit
  max_cluster_positions: 2         # Max simultaneous positions in same correlation cluster
  atr_stop_multiplier: 1.5         # Stop = MAX(1.5 × ATR14, swing distance)
  min_rr_ratio: 1.8                # Hard reject if R:R falls below this
  high_vol_position_reduction: 0.30  # Reduce size 30% when 7d vol > 2× 30d vol
  high_vol_stop_widening: 0.20       # Widen stops 20% in high vol environment

# ── Pre-analysis filters ──────────────────────────────────────────────────────
filters:
  # Time filter
  time_filter_enabled: true
  time_filter_start_utc: 22        # Block signals from 22:00 UTC
  time_filter_end_utc: 2           # Until 02:00 UTC
  vol_zscore_override_threshold: 2.5  # Override time filter if volume this extreme

  # Marginal zone (reduced confidence, not full block)
  marginal_zone_start_utc: 2
  marginal_zone_end_utc: 4
  marginal_zone_confidence_penalty: 5

  # Liquidity gate (Issue 2 — dynamic percentile-based)
  liquidity_gate_enabled: true
  liquidity_volume_percentile: 40  # Symbol must be above P40 of its own 30d history
  liquidity_lookback_days: 30
  spread_threshold_pct: 0.15       # Max bid/ask spread allowed

# ── Technical indicators ──────────────────────────────────────────────────────
indicators:
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  ema_short: 20
  ema_long: 50
  adx_period: 14
  choppiness_period: 14
  atr_period: 14
  atr_timeframe: 15m               # ATR for stop sizing uses 15m candles
  volume_zscore_period: 20
  swing_lookback: 5                # Candles each side for swing point detection
  ema_slope_lookback: 10           # Candles for linear regression slope

# ── Confidence score engine ───────────────────────────────────────────────────
confidence:
  min_score: 72                    # Below this → REJECT, output nothing
  futures_blocked_cap: 75          # Max score when futures API unavailable
  weights:
    regime: 15
    btc_alignment: 15
    trend_quality: 20
    relative_strength: 10
    volume: 10
    open_interest: 8
    funding_rate: 5
    sr_room: 7
    volatility: 5
    price_action: 5


# ── Discord ───────────────────────────────────────────────────────────────────
discord:
  webhook_a_plus: ${DISCORD_WEBHOOK_A_PLUS}
  webhook_a: ${DISCORD_WEBHOOK_A}
  webhook_b: ${DISCORD_WEBHOOK_B}
  webhook_c: ${DISCORD_WEBHOOK_C}
  webhook_system: ${DISCORD_WEBHOOK_SYSTEM}
  send_grade_c: false

# ── Paper trading ─────────────────────────────────────────────────────────────
paper_trading:
  min_days_before_live: 14         # Hard gate — live mode requires this many paper days
  slippage_pct: 0.05               # Simulated fill slippage per side
  daily_summary_utc_hour: 23
  daily_summary_utc_minute: 50

# ─────────────────────────────────────────────────────────────────────────────
# Legacy flat settings (kept for backward compatibility with old monitor system)
# ─────────────────────────────────────────────────────────────────────────────
poll_interval_minutes: 5
cooldown_minutes: 30
bb_period: 20
bb_std: 2.0
rsi_period: 14
rsi_overbought: 70.0
rsi_oversold: 30.0
ema_short: 20
ema_long: 50
swing_lookback: 50
log_dir: logs
